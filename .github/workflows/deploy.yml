name: Dispatch Auto-Manifest

on:
  push:
    branches:
      - main
    paths:
      - 'EditionArchive/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Builder
        run: node build-archive.js

      - name: Commit & Push Manifest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add archive-manifest.json
          git commit -m "Automated manifest update [skip ci]" || echo "No changes to commit"
          git push